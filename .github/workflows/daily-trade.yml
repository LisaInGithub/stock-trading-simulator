name: Daily AI Trade Decision

on:
  # Scheduled run disabled until ANTHROPIC_API_KEY is set (no billing set up yet).
  # Re-enable by uncommenting the schedule block below.
  # schedule:
  #   # 21:30 UTC, Mon-Fri — after the US market close (4pm ET) year-round
  #   - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily trading decision
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/run-daily.mjs

      - name: Commit and push updated decisions
        run: |
          git config user.name "ai-trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/decisions.json data/logs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "AI trade decision: $(date -u +%Y-%m-%d)"
            git push
          fi
